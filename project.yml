name: WardrobeManager
options:
  bundleIdPrefix: com.zjy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_NAME: WardrobeManager
    DEVELOPMENT_TEAM: ""
targets:
  WardrobeManager:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WardrobeManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zjy.WardrobeManager
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于导入衣物照片生成衣柜单品。
        INFOPLIST_KEY_NSCameraUsageDescription: 用于拍摄衣物照片并自动去除背景。
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: 1
    scheme:
      testTargets:
        - WardrobeManagerTests
  WardrobeManagerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WardrobeManagerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: WardrobeManagerTests
    dependencies:
      - target: WardrobeManager
